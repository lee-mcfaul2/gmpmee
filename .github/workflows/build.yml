name: Build & Package

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            arch: x86_64
            artifact: gmpmee-linux-x86_64
          # Linux ARM64
          - os: ubuntu-24.04-arm
            arch: aarch64
            artifact: gmpmee-linux-aarch64
          # macOS x86_64 (via Rosetta)
          - os: macos-latest
            arch: x86_64
            artifact: gmpmee-macos-x86_64
            rosetta: true
          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            arch: arm64
            artifact: gmpmee-macos-arm64
          # Windows x86_64
          - os: windows-latest
            arch: x86_64
            artifact: gmpmee-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja mingw-w64-x86_64-gmp
          update: false

      # ---- Caching ----

      - name: Cache Homebrew packages
        if: runner.os == 'macOS' && !matrix.rosetta
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/gmp
          key: brew-arm64-gmp-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: brew-arm64-gmp-

      - name: Cache x86_64 Homebrew
        if: matrix.rosetta
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/Homebrew
            /usr/local/Cellar
            /usr/local/lib
            /usr/local/include
            /usr/local/bin
          key: brew-x86_64-gmp-cmake-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: brew-x86_64-gmp-cmake-

      # ---- Install dependencies ----

      - name: Install GMP (Ubuntu)
        if: runner.os == 'Linux'
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev

      - name: Install GMP (macOS native)
        if: runner.os == 'macOS' && !matrix.rosetta
        run: brew install gmp

      - name: Install x86_64 Homebrew and GMP (macOS via Rosetta)
        if: matrix.rosetta
        run: |
          if [ -x /usr/local/bin/brew ]; then
            echo "x86_64 Homebrew already cached"
          else
            arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          arch -x86_64 /usr/local/bin/brew install gmp cmake

      # ---- Configure ----

      - name: Configure (Unix)
        if: runner.os != 'Windows' && !matrix.rosetta
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/_dist

      - name: Configure (macOS x86_64 via Rosetta)
        if: matrix.rosetta
        run: |
          arch -x86_64 /usr/local/bin/cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/_dist \
            -DCMAKE_PREFIX_PATH=/usr/local \
            -DCMAKE_OSX_ARCHITECTURES=x86_64

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cmake -B build \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$(cygpath -u '${{ github.workspace }}/_dist')

      # ---- Build ----

      - name: Build
        if: runner.os != 'Windows' && !matrix.rosetta
        run: cmake --build build --config Release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build --config Release

      - name: Build (Rosetta)
        if: matrix.rosetta
        run: arch -x86_64 /usr/local/bin/cmake --build build --config Release

      # ---- Install ----

      - name: Install
        if: runner.os != 'Windows' && !matrix.rosetta
        run: cmake --install build --config Release

      - name: Install (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --install build --config Release

      - name: Install (Rosetta)
        if: matrix.rosetta
        run: arch -x86_64 /usr/local/bin/cmake --install build --config Release

      # ---- Test ----

      - name: Run tests (Unix)
        if: runner.os != 'Windows' && !matrix.rosetta
        run: |
          cd build
          ./simexp_test 10 512 5 3 50
          ./fixexp_test 10 512 5 200
          ./millerrabin_test 10 512 100

      - name: Run tests (macOS x86_64 via Rosetta)
        if: matrix.rosetta
        run: |
          cd build
          arch -x86_64 ./simexp_test 10 512 5 3 50
          arch -x86_64 ./fixexp_test 10 512 5 200
          arch -x86_64 ./millerrabin_test 10 512 100

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cd build
          ./simexp_test.exe 10 512 5 3 50
          ./fixexp_test.exe 10 512 5 200
          ./millerrabin_test.exe 10 512 100

      # ---- Package & Upload ----

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd ${{ github.workspace }}/_dist
          tar czf ${{ github.workspace }}/${{ matrix.artifact }}.tar.gz .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cd $(cygpath -u '${{ github.workspace }}/_dist')
          tar czf $(cygpath -u '${{ github.workspace }}')/${{ matrix.artifact }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        run: |
          # Get the latest tag, default to v0.0.0 if none exists
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          # Increment patch version
          MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Generated version: $NEW_TAG"

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
